name: Build ih_tweaks
on:
  push:
    paths:
      - ".github/workflows/ih_tweaks.yml"
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Generate sources
        run: |
          mkdir -p ih_tweaks/src/main/java/dev/ih/tweaks/mixin
          mkdir -p ih_tweaks/src/main/resources/META-INF
          cat > ih_tweaks/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  maven { url = 'https://maven.neoforged.net/releases' }
              }
          }
          rootProject.name = 'ih_tweaks'
          EOF
          cat > ih_tweaks/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2G
          EOF
          cat > ih_tweaks/build.gradle <<'EOF'
          plugins {
              id 'java'
              id 'net.neoforged.moddev' version '2.0.78'
          }
          version = '1.0.0'
          group = 'dev.ih'
          base { archivesName = 'ih_tweaks' }
          java { toolchain { languageVersion = JavaLanguageVersion.of(21) } }
          neoForge {
              version = '21.1.236'
          }
          EOF
          cat > ih_tweaks/src/main/resources/META-INF/neoforge.mods.toml <<'EOF'
          modLoader = "javafml"
          loaderVersion = "[4,)"
          license = "MIT"
          [[mods]]
          modId = "ih_tweaks"
          version = "1.0.0"
          displayName = "IH Tweaks"
          description = "Server tweaks for Industrial Horizon: no join/leave spam, teleport cooldown as overlay"
          [[mixins]]
          config = "ih_tweaks.mixins.json"
          EOF
          cat > ih_tweaks/src/main/resources/ih_tweaks.mixins.json <<'EOF'
          {
            "required": true,
            "minVersion": "0.8",
            "package": "dev.ih.tweaks.mixin",
            "compatibilityLevel": "JAVA_21",
            "mixins": [
              "PlayerListMixin",
              "ServerPlayerMixin"
            ],
            "injectors": {
              "defaultRequire": 1
            }
          }
          EOF
          cat > ih_tweaks/src/main/java/dev/ih/tweaks/IhTweaks.java <<'EOF'
          package dev.ih.tweaks;

          import net.neoforged.fml.common.Mod;

          @Mod("ih_tweaks")
          public class IhTweaks {
          }
          EOF
          cat > ih_tweaks/src/main/java/dev/ih/tweaks/mixin/PlayerListMixin.java <<'EOF'
          package dev.ih.tweaks.mixin;

          import net.minecraft.network.chat.Component;
          import net.minecraft.network.chat.contents.TranslatableContents;
          import net.minecraft.server.players.PlayerList;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(PlayerList.class)
          public abstract class PlayerListMixin {
              @Inject(
                  method = "broadcastSystemMessage(Lnet/minecraft/network/chat/Component;Z)V",
                  at = @At("HEAD"),
                  cancellable = true
              )
              private void ihTweaks$muteJoinLeave(Component message, boolean bypassHiddenChat, CallbackInfo ci) {
                  if (message.getContents() instanceof TranslatableContents tc) {
                      String key = tc.getKey();
                      if (key.startsWith("multiplayer.player.joined") || key.startsWith("multiplayer.player.left")) {
                          ci.cancel();
                      }
                  }
              }
          }
          EOF
          cat > ih_tweaks/src/main/java/dev/ih/tweaks/mixin/ServerPlayerMixin.java <<'EOF'
          package dev.ih.tweaks.mixin;

          import net.minecraft.network.chat.Component;
          import net.minecraft.network.chat.contents.TranslatableContents;
          import net.minecraft.server.level.ServerPlayer;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(ServerPlayer.class)
          public abstract class ServerPlayerMixin {
              @Inject(
                  method = "sendSystemMessage(Lnet/minecraft/network/chat/Component;)V",
                  at = @At("HEAD"),
                  cancellable = true
              )
              private void ihTweaks$cooldownOverlay(Component message, CallbackInfo ci) {
                  if (message.getContents() instanceof TranslatableContents tc) {
                      if ("ftbessentials.teleport.on_cooldown".equals(tc.getKey())) {
                          ServerPlayer self = (ServerPlayer) (Object) this;
                          self.displayClientMessage(message, true);
                          ci.cancel();
                      }
                  }
              }
          }
          EOF
      - name: Build
        run: gradle -p ih_tweaks build --no-daemon
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ih_tweaks
          path: ih_tweaks/build/libs/*.jar
      - name: Attach to modpack release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: modpack
          files: ih_tweaks/build/libs/ih_tweaks-1.0.0.jar
