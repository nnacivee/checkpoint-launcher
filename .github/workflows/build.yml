name: Build and Release Launcher

on:
  push:
    branches: [main]
    paths:
      - "launcher.py"
      - "tg_notify.py"
      - "requirements.txt"
      - "icon.ico"
      - "window_icon.png"
      - "background.png"
      - "logo.png"
      - "mods_ru.json"
      - "icons/**"
      - "fonts/**"
      # Сам файл сборки тоже отслеживаем. Без этой строки правка build.yml
      # не запускала пересборку: однажды из-за этого вышла версия, куда не
      # попал фон — лаунчер показывал чёрное окно вместо арта.
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

permissions:
  contents: write

# Сборки идут по очереди, а не одновременно. 15.07 два пуша подряд запустили
# #59 и #60 параллельно — обе успели бы решить, что версия ещё не выходила, и
# написали бы в Telegram по посту. Очередь убирает эту гонку.
concurrency:
  group: build-and-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # Дешёвая проверка синтаксиса до тяжёлых шагов: PyInstaller на опечатке
      # падает где-то в середине сборки и невнятно, а тут ошибка видна сразу.
      - name: Check launcher.py compiles
        run: python -m py_compile launcher.py

      - name: Read version from launcher.py
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path launcher.py -Pattern '"LAUNCHER_VERSION":\s*"([^"]+)"'
          $version = $match.Matches[0].Groups[1].Value
          echo "Detected version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      # --onefile: ровно один Launcher.exe, тот же формат, что раздаёт сайт и
      # зеркало и что уже стоит у всех игроков. Обновление подменяет этот один
      # файл собой (см. _apply_downloaded_update в launcher.py) — никакого
      # установщика и второй копии рядом со старой.
      - name: Build Launcher.exe
        shell: pwsh
        run: |
          $args = @("--onefile", "--noconsole", "--name", "Launcher")
          if (Test-Path "icon.ico") {
            $args += "--icon=icon.ico"
            $args += "--add-data=icon.ico;."
          }
          if (Test-Path "icons") {
            $args += "--add-data=icons;icons"
          }
          if (Test-Path "window_icon.png") {
            $args += "--add-data=window_icon.png;."
          }
          if (Test-Path "background.png") {
            $args += "--add-data=background.png;."
          }
          if (Test-Path "logo.png") {
            $args += "--add-data=logo.png;."
          }
          if (Test-Path "mods_ru.json") {
            $args += "--add-data=mods_ru.json;."
          }
          # Lato для интерфейса. Без этой строки шрифты не попадут в сборку,
          # load_bundled_fonts() не найдёт файлы и лаунчер молча останется на
          # Segoe UI — ошибки не будет, поэтому проверять надо глазами.
          if (Test-Path "fonts") {
            $args += "--add-data=fonts;fonts"
          }
          $args += "launcher.py"
          pyinstaller @args

      - name: Check Launcher.exe really built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\Launcher.exe")) {
            throw "dist\Launcher.exe not found"
          }
          $size = (Get-Item "dist\Launcher.exe").Length / 1MB
          echo ("Launcher.exe size: {0:N1} MB" -f $size)
          # Заголовок PE "MZ" — минимальная гарантия, что это работающий .exe,
          # а не обрывок. Заодно отсекаем совсем маленькие битые файлы.
          $bytes = [System.IO.File]::ReadAllBytes("dist\Launcher.exe")
          if ($bytes.Length -lt 3000000 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            throw "dist\Launcher.exe looks corrupted (no MZ header or too small)"
          }
          echo "OK: MZ header present"

      # Файл версии для зеркала. Лаунчер игроков читает его при старте
      # (LAUNCHER_VERSION_MIRROR_URL) и показывает баннер «доступна версия…».
      # Генерируем из launcher.py, чтобы номер всегда совпадал со сборкой.
      - name: Prepare mirror upload folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path deploy | Out-Null
          Copy-Item "dist\Launcher.exe" "deploy\Launcher.exe" -Force
          "${{ steps.version.outputs.version }}" | Out-File -FilePath "deploy\launcher_version.txt" -Encoding ascii -NoNewline
          Get-ChildItem deploy

      # Автозагрузка на зеркало по SFTP (панель хостинга). GitHub в РФ
      # заблокирован, поэтому игроки качают Launcher.exe именно с зеркала —
      # этот шаг кладёт туда свежий файл сам, без ручной заливки по FTP.
      #
      # Секреты (Settings -> Secrets and variables -> Actions):
      #   MIRROR_SFTP_SERVER   — хост SFTP панели (напр. mgr.hosting-minecraft.pro)
      #   MIRROR_SFTP_PORT     — порт SFTP (у Pterodactyl обычно 2022)
      #   MIRROR_SFTP_USER     — логин SFTP (напр. name.381b54ac)
      #   MIRROR_SFTP_PASSWORD — пароль от панели
      #   MIRROR_REMOTE_DIR    — папка веб-корня зеркала, куда лежат Launcher.exe
      #                          и launcher_version.txt (напр. /bluemap/web)
      #
      # continue-on-error: даже если зеркало недоступно или секрет с опечаткой —
      # релиз на GitHub всё равно выходит, а файл можно долить руками.
      - name: Upload to mirror (SFTP)
        continue-on-error: true
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.MIRROR_SFTP_SERVER }}
          port: ${{ secrets.MIRROR_SFTP_PORT }}
          username: ${{ secrets.MIRROR_SFTP_USER }}
          password: ${{ secrets.MIRROR_SFTP_PASSWORD }}
          local_path: "./deploy/*"
          remote_path: ${{ secrets.MIRROR_REMOTE_DIR }}
          delete_remote_files: false

      # Проверяем ДО создания релиза: выходила ли уже эта версия. От этого
      # зависит, писать ли в Telegram. Пересборка той же версии (правка
      # build.yml, повторный запуск, докинули файл) — не новость, и постить
      # её второй раз не надо.
      - name: Has this version been released before?
        id: released
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          $url = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
          $exists = "false"
          try {
            Invoke-RestMethod -Uri $url -Headers @{
              Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
              "User-Agent"  = "checkpoint-launcher-ci"
            } -ErrorAction Stop | Out-Null
            $exists = "true"
          } catch {
            # 404 = релиза нет, значит версия новая. Любая другая ошибка —
            # тоже считаем, что нет: пропущенный пост не так обиден, как
            # упавшая сборка.
            $exists = "false"
          }
          echo "Release $tag exists: $exists"
          echo "exists=$exists" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release with Launcher.exe attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/Launcher.exe
          generate_release_notes: false

      # Пост в Telegram-канал. Текст берётся из LAUNCHER_CHANGELOG в
      # launcher.py — писать его отдельно не нужно.
      #
      # Токены живут в Settings -> Secrets and variables -> Actions:
      #   TELEGRAM_BOT_TOKEN — токен от @BotFather
      #   TELEGRAM_CHAT_ID   — id канала, для приватного вида -100...
      # Пока секретов нет, шаг тихо ничего не делает и сборку не роняет.
      #
      # Шаг идёт ПОСЛЕ релиза: если сборка упала, в канал ничего не уходит.
      # А условие ниже — про то, что новость это только первый выход версии:
      # без него пересборка той же 1.20.0 продублировала пост в группе.
      - name: Tell Telegram about the release
        if: steps.released.outputs.exists == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: >
          python tg_notify.py
          "${{ steps.version.outputs.version }}"
          "https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
