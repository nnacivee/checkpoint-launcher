name: Build and Release Launcher

on:
  push:
    branches: [main]
    paths:
      - "launcher.py"
      - "webui.py"
      - "ui/**"
      - "tg_notify.py"
      - "requirements.txt"
      - "installer.iss"
      - "icon.ico"
      - "window_icon.png"
      - "background.png"
      - "logo.png"
      - "mods_ru.json"
      - "icons/**"
      - "fonts/**"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-and-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Check launcher.py and webui.py compile
        run: python -m py_compile launcher.py webui.py

      - name: Read version from launcher.py
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path launcher.py -Pattern '"LAUNCHER_VERSION":\s*"([^"]+)"'
          $version = $match.Matches[0].Groups[1].Value
          echo "Detected version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      # --onedir, а НЕ --onefile. Один .exe распаковывал себя в Temp при каждом
      # запуске, и это регулярно падало с "Failed to load Python DLL
      # python312.dll" (антивирус/среда не успевали загрузить DLL из Temp).
      # Папка ничего не распаковывает — ошибка невозможна в принципе.
      # Пользователь всё равно качает один файл: установщик ниже.
      - name: Build app folder
        shell: pwsh
        run: |
          $args = @("--onedir", "--noconsole", "--name", "Launcher")
          if (Test-Path "icon.ico") {
            $args += "--icon=icon.ico"
            $args += "--add-data=icon.ico;."
          }
          if (Test-Path "icons") {
            $args += "--add-data=icons;icons"
          }
          if (Test-Path "window_icon.png") {
            $args += "--add-data=window_icon.png;."
          }
          if (Test-Path "background.png") {
            $args += "--add-data=background.png;."
          }
          if (Test-Path "logo.png") {
            $args += "--add-data=logo.png;."
          }
          if (Test-Path "mods_ru.json") {
            $args += "--add-data=mods_ru.json;."
          }
          if (Test-Path "fonts") {
            $args += "--add-data=fonts;fonts"
          }
          # Новый интерфейс: HTML/CSS/JS страницы кладём рядом с exe.
          if (Test-Path "ui") {
            $args += "--add-data=ui;ui"
          }
          # pywebview тащит бэкенд WebView2 и pythonnet — собираем целиком,
          # иначе окно нового интерфейса не откроется на чистой машине.
          $args += "--collect-all=webview"
          # Точка входа — webui.py (окно pywebview). Он импортирует launcher.py
          # ради всей логики и сам откатывается на старый tkinter, если на ПК
          # почему-то нет WebView2.
          $args += "webui.py"
          pyinstaller @args

      - name: Check the app folder really built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\Launcher\Launcher.exe")) {
            throw "dist\Launcher\Launcher.exe not found"
          }
          # DLL должна лежать рядом, а не распаковываться в Temp.
          $dll = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter "python3*.dll"
          if (-not $dll) { throw "python3xx.dll is missing from the app folder" }
          echo "OK: $($dll[0].FullName)"
          foreach ($res in @("background.png", "logo.png", "mods_ru.json", "icon.ico", "window_icon.png")) {
            if (Test-Path $res) {
              $found = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter $res
              if (-not $found) { throw "$res is missing from the built app" }
              echo "OK: $res -> $($found[0].FullName)"
            }
          }
          $icons = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter "discord_dark.png"
          if (-not $icons) { throw "icons/ are missing from the built app" }
          # Страница нового интерфейса обязана попасть в сборку.
          $ui = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter "index.html"
          if (-not $ui) { throw "ui/index.html is missing from the built app" }
          echo "OK: ui -> $($ui[0].FullName)"
          # Бэкенд WebView2 от pywebview (WebView2Loader.dll).
          $wv = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter "WebView2Loader.dll" -ErrorAction SilentlyContinue
          if ($wv) { echo "OK: WebView2Loader.dll -> $($wv[0].FullName)" } else { echo "WARN: WebView2Loader.dll not found (pywebview may load it at runtime)" }

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.version }}" installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with $LASTEXITCODE" }
          if (-not (Test-Path "installer_out\CheckpointSetup.exe")) {
            throw "installer was not produced"
          }
          $size = (Get-Item "installer_out\CheckpointSetup.exe").Length / 1MB
          echo ("Installer size: {0:N1} MB" -f $size)

      # Файлы для зеркала: установщик + номер версии. Лаунчер игроков читает
      # launcher_version.txt (LAUNCHER_VERSION_MIRROR_URL) и качает установщик
      # с зеркала (LAUNCHER_EXE_MIRROR_URL) — минуя заблокированный в РФ GitHub.
      - name: Prepare mirror upload folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path deploy | Out-Null
          Copy-Item "installer_out\CheckpointSetup.exe" "deploy\CheckpointSetup.exe" -Force
          "${{ steps.version.outputs.version }}" | Out-File -FilePath "deploy\launcher_version.txt" -Encoding ascii -NoNewline
          Get-ChildItem deploy

      - name: Upload build artifact for the deploy job
        uses: actions/upload-artifact@v4
        with:
          name: mirror-files
          path: deploy/
          retention-days: 1

      - name: Has this version been released before?
        id: released
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          $url = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
          $exists = "false"
          try {
            Invoke-RestMethod -Uri $url -Headers @{
              Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
              "User-Agent"  = "checkpoint-launcher-ci"
            } -ErrorAction Stop | Out-Null
            $exists = "true"
          } catch {
            $exists = "false"
          }
          echo "Release $tag exists: $exists"
          echo "exists=$exists" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release with the installer attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: installer_out/CheckpointSetup.exe
          generate_release_notes: false

      - name: Tell Telegram about the release
        if: steps.released.outputs.exists == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: >
          python tg_notify.py
          "${{ steps.version.outputs.version }}"
          "https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"

  # ------------------------------------------------------------------------
  # Заливка установщика на зеркало (Linux-джоб: SFTP-инструменты надёжно
  # работают именно на Linux). Берём собранный CheckpointSetup.exe и кладём в
  # веб-корень зеркала обычным lftp. Пока секретов нет — шаг тихо пропускается.
  #   MIRROR_SFTP_SERVER / _PORT / _USER / _PASSWORD / MIRROR_REMOTE_DIR
  # ------------------------------------------------------------------------
  deploy-mirror:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download built files
        uses: actions/download-artifact@v4
        with:
          name: mirror-files
          path: deploy

      - name: Upload to mirror over SFTP (lftp)
        env:
          SRV: ${{ secrets.MIRROR_SFTP_SERVER }}
          PRT: ${{ secrets.MIRROR_SFTP_PORT }}
          USR: ${{ secrets.MIRROR_SFTP_USER }}
          PW: ${{ secrets.MIRROR_SFTP_PASSWORD }}
          DIR: ${{ secrets.MIRROR_REMOTE_DIR }}
        run: |
          if [ -z "$SRV" ] || [ -z "$USR" ] || [ -z "$PW" ]; then
            echo "::warning::Секреты MIRROR_SFTP_* не заданы — загрузка на зеркало пропущена."
            exit 0
          fi
          sudo apt-get update -y >/dev/null && sudo apt-get install -y lftp >/dev/null
          PORT="${PRT:-2022}"
          REMOTE="${DIR:-/}"
          echo "Заливаю CheckpointSetup.exe и launcher_version.txt на $SRV:$PORT$REMOTE"
          lftp -c "set sftp:auto-confirm yes; set net:timeout 20; set net:max-retries 2; open -u '$USR','$PW' -p $PORT sftp://$SRV; cd '$REMOTE'; put deploy/CheckpointSetup.exe; put deploy/launcher_version.txt; bye"
          echo "Готово: зеркало обновлено."
