name: Build and Release Launcher

on:
  push:
    branches: [main]
    paths:
      - "launcher.py"
      - "requirements.txt"
      - "installer.iss"
      - "icon.ico"
      - "window_icon.png"
      - "background.png"
      - "logo.png"
      - "icons/**"
      # Сам файл сборки тоже отслеживаем. Без этой строки правка build.yml
      # не запускала пересборку: однажды из-за этого вышла версия, куда не
      # попал фон — лаунчер показывал чёрное окно вместо арта.
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # Дешёвая проверка синтаксиса до тяжёлых шагов: PyInstaller на опечатке
      # падает где-то в середине сборки и невнятно, а тут ошибка видна сразу.
      - name: Check launcher.py compiles
        run: python -m py_compile launcher.py

      - name: Read version from launcher.py
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path launcher.py -Pattern '"LAUNCHER_VERSION":\s*"([^"]+)"'
          $version = $match.Matches[0].Groups[1].Value
          echo "Detected version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      # --onedir, а НЕ --onefile. Один .exe распаковывал себя в Temp при каждом
      # запуске, и сразу после обновления это падало с "Failed to load Python
      # DLL python312.dll" (антивирус ещё проверял свежий файл). Папка ничего не
      # распаковывает — ошибка невозможна в принципе. Пользователь всё равно
      # качает один файл: установщик ниже.
      - name: Build app folder
        shell: pwsh
        run: |
          $args = @("--onedir", "--noconsole", "--name", "Launcher")
          if (Test-Path "icon.ico") {
            $args += "--icon=icon.ico"
            $args += "--add-data=icon.ico;."
          }
          if (Test-Path "icons") {
            $args += "--add-data=icons;icons"
          }
          if (Test-Path "window_icon.png") {
            $args += "--add-data=window_icon.png;."
          }
          if (Test-Path "background.png") {
            $args += "--add-data=background.png;."
          }
          if (Test-Path "logo.png") {
            $args += "--add-data=logo.png;."
          }
          $args += "launcher.py"
          pyinstaller @args

      - name: Check the app folder really built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\Launcher\Launcher.exe")) {
            throw "dist\Launcher\Launcher.exe not found"
          }
          # Главный смысл перехода: DLL должна лежать рядом, а не распаковываться.
          $dll = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter "python3*.dll"
          if (-not $dll) { throw "python3xx.dll is missing from the app folder" }
          echo "OK: $($dll[0].FullName)"
          # Ресурсы должны реально лежать в сборке. Один раз фон не попал в exe,
          # и это заметил только пользователь — окно было чёрным.
          foreach ($res in @("background.png", "logo.png", "icon.ico", "window_icon.png")) {
            if (Test-Path $res) {
              $found = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter $res
              if (-not $found) { throw "$res is missing from the built app" }
              echo "OK: $res -> $($found[0].FullName)"
            }
          }
          $icons = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter "discord_dark.png"
          if (-not $icons) { throw "icons/ are missing from the built app" }

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.version }}" installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with $LASTEXITCODE" }
          if (-not (Test-Path "installer_out\CheckpointSetup.exe")) {
            throw "installer was not produced"
          }
          $size = (Get-Item "installer_out\CheckpointSetup.exe").Length / 1MB
          echo ("Installer size: {0:N1} MB" -f $size)

      - name: Create GitHub Release with the installer attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: installer_out/CheckpointSetup.exe
          generate_release_notes: false
