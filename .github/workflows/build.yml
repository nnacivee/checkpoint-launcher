name: Build and Release Launcher

on:
  push:
    branches: [main]
    paths:
      - "launcher.py"
      - "tg_notify.py"
      - "requirements.txt"
      - "installer.iss"
      - "icon.ico"
      - "window_icon.png"
      - "background.png"
      - "logo.png"
      - "mods_ru.json"
      - "icons/**"
      - "fonts/**"
      # Сам файл сборки тоже отслеживаем. Без этой строки правка build.yml
      # не запускала пересборку: однажды из-за этого вышла версия, куда не
      # попал фон — лаунчер показывал чёрное окно вместо арта.
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

permissions:
  contents: write

# Сборки идут по очереди, а не одновременно. 15.07 два пуша подряд запустили
# #59 и #60 параллельно — обе успели бы решить, что версия ещё не выходила, и
# написали бы в Telegram по посту. Очередь убирает эту гонку.
concurrency:
  group: build-and-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # Дешёвая проверка синтаксиса до тяжёлых шагов: PyInstaller на опечатке
      # падает где-то в середине сборки и невнятно, а тут ошибка видна сразу.
      - name: Check launcher.py compiles
        run: python -m py_compile launcher.py

      - name: Read version from launcher.py
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path launcher.py -Pattern '"LAUNCHER_VERSION":\s*"([^"]+)"'
          $version = $match.Matches[0].Groups[1].Value
          echo "Detected version: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      # --onedir, а НЕ --onefile. Один .exe распаковывал себя в Temp при каждом
      # запуске, и сразу после обновления это падало с "Failed to load Python
      # DLL python312.dll" (антивирус ещё проверял свежий файл). Папка ничего не
      # распаковывает — ошибка невозможна в принципе. Пользователь всё равно
      # качает один файл: установщик ниже.
      - name: Build app folder
        shell: pwsh
        run: |
          $args = @("--onedir", "--noconsole", "--name", "Launcher")
          if (Test-Path "icon.ico") {
            $args += "--icon=icon.ico"
            $args += "--add-data=icon.ico;."
          }
          if (Test-Path "icons") {
            $args += "--add-data=icons;icons"
          }
          if (Test-Path "window_icon.png") {
            $args += "--add-data=window_icon.png;."
          }
          if (Test-Path "background.png") {
            $args += "--add-data=background.png;."
          }
          if (Test-Path "logo.png") {
            $args += "--add-data=logo.png;."
          }
          if (Test-Path "mods_ru.json") {
            $args += "--add-data=mods_ru.json;."
          }
          # Lato для интерфейса. Без этой строки шрифты не попадут в сборку,
          # load_bundled_fonts() не найдёт файлы и лаунчер молча останется на
          # Segoe UI — ошибки не будет, поэтому проверять надо глазами.
          if (Test-Path "fonts") {
            $args += "--add-data=fonts;fonts"
          }
          $args += "launcher.py"
          pyinstaller @args

      - name: Check the app folder really built
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\Launcher\Launcher.exe")) {
            throw "dist\Launcher\Launcher.exe not found"
          }
          # Главный смысл перехода: DLL должна лежать рядом, а не распаковываться.
          $dll = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter "python3*.dll"
          if (-not $dll) { throw "python3xx.dll is missing from the app folder" }
          echo "OK: $($dll[0].FullName)"
          # Ресурсы должны реально лежать в сборке. Один раз фон не попал в exe,
          # и это заметил только пользователь — окно было чёрным.
          foreach ($res in @("background.png", "logo.png", "mods_ru.json", "icon.ico", "window_icon.png")) {
            if (Test-Path $res) {
              $found = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter $res
              if (-not $found) { throw "$res is missing from the built app" }
              echo "OK: $res -> $($found[0].FullName)"
            }
          }
          $icons = Get-ChildItem -Path "dist\Launcher" -Recurse -Filter "discord_dark.png"
          if (-not $icons) { throw "icons/ are missing from the built app" }

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.version }}" installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with $LASTEXITCODE" }
          if (-not (Test-Path "installer_out\CheckpointSetup.exe")) {
            throw "installer was not produced"
          }
          $size = (Get-Item "installer_out\CheckpointSetup.exe").Length / 1MB
          echo ("Installer size: {0:N1} MB" -f $size)

      # Проверяем ДО создания релиза: выходила ли уже эта версия. От этого
      # зависит, писать ли в Telegram. Пересборка той же версии (правка
      # build.yml, повторный запуск, докинули файл) — не новость, и постить
      # её второй раз не надо.
      - name: Has this version been released before?
        id: released
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          $url = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
          $exists = "false"
          try {
            Invoke-RestMethod -Uri $url -Headers @{
              Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
              "User-Agent"  = "checkpoint-launcher-ci"
            } -ErrorAction Stop | Out-Null
            $exists = "true"
          } catch {
            # 404 = релиза нет, значит версия новая. Любая другая ошибка —
            # тоже считаем, что нет: пропущенный пост не так обиден, как
            # упавшая сборка.
            $exists = "false"
          }
          echo "Release $tag exists: $exists"
          echo "exists=$exists" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release with the installer attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: installer_out/CheckpointSetup.exe
          generate_release_notes: false

      # Пост в Telegram-канал. Текст берётся из LAUNCHER_CHANGELOG в
      # launcher.py — писать его отдельно не нужно.
      #
      # Токены живут в Settings -> Secrets and variables -> Actions:
      #   TELEGRAM_BOT_TOKEN — токен от @BotFather
      #   TELEGRAM_CHAT_ID   — id канала, для приватного вида -100...
      # Пока секретов нет, шаг тихо ничего не делает и сборку не роняет.
      #
      # Шаг идёт ПОСЛЕ релиза: если сборка упала, в канал ничего не уходит.
      # А условие ниже — про то, что новость это только первый выход версии:
      # без него пересборка той же 1.20.0 продублировала пост в группе.
      - name: Tell Telegram about the release
        if: steps.released.outputs.exists == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: >
          python tg_notify.py
          "${{ steps.version.outputs.version }}"
          "https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
